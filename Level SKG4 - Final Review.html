function seededShuffle(arr,seed){const a=[...arr];let s=seed;for(let i=a.length-1;i>0;i--){s=(s*1664525+1013904223)&0xffffffff;const j=Math.abs(s)%(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}
function scrambleWord(ans,seed){let chars=ans.replace(/\s+/g,'').split('');let s=seed,a=[...chars];for(let i=a.length-1;i>0;i--){s=(s*1103515245+12345)&0x7fffffff;const j=s%(i+1);[a[i],a[j]]=[a[j],a[i]]}if(a.join('').toLowerCase()===chars.join('').toLowerCase()&&a.length>1)[a[0],a[1]]=[a[1],a[0]];return a.join('  ')}
const SHUFFLE={},SCRAMBLE={};QS.forEach((q,i)=>{if(q.t===3){let sh=seededShuffle(q.chunks.map((_,j)=>j),i*47+11);if(sh[0]===0){const sw=sh.findIndex((x,p)=>p>0);[sh[0],sh[sw]]=[sh[sw],sh[0]]}SHUFFLE[i]=sh}if(q.t===4)SCRAMBLE[i]=scrambleWord(q.answer,i*71+9)});
let cur=0,answered=[],arState={};
function norm(s){return String(s).trim().toLowerCase().replace(/[.!?]/g,'').replace(/[’]/g,"'").replace(/\s+/g,' ')}
function wordNorm(s){return norm(s).replace(/\s+/g,' ')}
function hiHTML(s){return s.replace(/<hi>(.*?)<\/hi>/g,'<span class="hi">$1</span>')}
const typeLabel=['','Complete the sentence','Find the error','Arrange the chunks','Unscramble the word'],typeIcon=['','✏️','🔍','🔀','🔤'],typeColor=['','b1','b2','b3','b4'];
const PARTS=[{label:'Part 1',icon:'✏️',start:0,size:14},{label:'Part 2',icon:'🔍',start:14,size:14},{label:'Part 3',icon:'🔀',start:28,size:14},{label:'Part 4',icon:'🔤',start:42,size:14}];
function partOf(i){return i<14?0:i<28?1:i<42?2:3}
function fitTextOneLine(el,max,min){if(!el)return;const original=parseFloat(getComputedStyle(el).fontSize);let size=max||original;el.style.whiteSpace='nowrap';el.style.overflow='hidden';el.style.fontSize=size+'px';while(size>(min||16)&&el.scrollWidth>el.clientWidth){size-=1;el.style.fontSize=size+'px'}}
function applyAdaptiveLayout(){['.sentence-line','.err-sentence','.helper-line','.context-line'].forEach(sel=>{const el=document.querySelector(sel);if(el)fitTextOneLine(el,null,sel==='.helper-line'?13:16)})}
function renderTabs(i){return `<div class="part-tabs">${PARTS.map((p,pi)=>{const done=answered.slice(p.start,p.start+p.size).filter(x=>x!==undefined).length,active=partOf(i)===pi;return `<button class="ptab${active?' active':''}" onclick="go(${p.start})">${p.icon} ${p.label}<span class="pt-label">${done}/${p.size} done</span></button>`}).join('')}</div>`}
function render(i){cur=i;const q=QS[i],done=answered.filter(x=>x!==undefined).length,correct=answered.filter(x=>x==='ok').length,pct=Math.round(done/QS.length*100);let body='';
if(q.t===1){const dis=answered[i]!==undefined;body=`<div class="sentence-line">${q.before} <span class="blank"></span> ${q.after}</div><div class="hint-tag">💡 ${q.hint}</div><input class="fi" type="text" id="fi${i}" placeholder="Type your answer…" ${dis?'disabled':''} onkeydown="if(event.key==='Enter')chkFill(${i})"/><button class="ckbtn" style="margin-top:10px" onclick="chkFill(${i})" ${dis?'disabled':''}>Check ✓</button>`}
else if(q.t===2){const opts=q.parts.map((p,j)=>{let cls='obtn';if(answered[i]!==undefined){if(j===q.correct)cls='obtn correct';else if(typeof answered[i]==='number'&&answered[i]===j)cls='obtn wrong'}return `<button class="${cls}" id="op${i}_${j}" onclick="pickOpt(${i},${j})" ${answered[i]!==undefined?'disabled':''}>${String.fromCharCode(65+j)}. ${p}</button>`}).join('');body=`<div class="helper-line">Which part has an error?</div><div class="err-sentence">"${q.sentence}"</div><div class="opts">${opts}</div>`}
else if(q.t===3){if(!arState[i])arState[i]={chosen:[],available:[...SHUFFLE[i]]};const st=arState[i],chips=SHUFFLE[i].map(ci=>`<span class="wchip${st.available.includes(ci)?'':' used'}" onclick="addC(${i},${ci})">${q.chunks[ci]}</span>`).join(''),achips=st.chosen.map((ci,j)=>`<button class="achip" onclick="remC(${i},${j})">${q.chunks[ci]} <em>✕</em></button>`).join(''),ph=st.chosen.length===0?'<span class="aph">Tap chunks to build the sentence →</span>':'';body=`<div class="helper-line">Put the chunks in the correct order.</div><div class="chips">${chips}</div><div class="abox">${ph}${achips}</div><button class="ckbtn" onclick="chkArr(${i})" ${answered[i]!==undefined?'disabled':''}>Check ✓</button>`}
else{const dis=answered[i]!==undefined;body=`<div class="sentence-line">${q.before} <span class="blank"></span> ${q.after}</div><div class="hint-tag">💡 ${q.hint}</div><div class="word-box"><span class="helper-line" style="margin:0">Reorder the letters:</span><span class="scrambled">${SCRAMBLE[i]}</span></div><input class="word-input" type="text" id="wi${i}" placeholder="Type the word…" ${dis?'disabled':''} onkeydown="if(event.key==='Enter')chkWord(${i})"/><button class="ckbtn" style="margin-top:10px" onclick="chkWord(${i})" ${dis?'disabled':''}>Check ✓</button>`}
const allDone=done===QS.length;document.getElementById('app').innerHTML=`<div class="qw">${renderTabs(i)}<div class="prog-row"><span class="prog-label">Question ${i+1} / ${QS.length}</span><span class="prog-score">✅ ${correct} correct</span></div><div class="pbar"><div class="pfill" style="width:${pct}%"></div></div><div class="qcard"><div class="qmeta"><span class="qnum">Q${i+1}</span><span class="badge ${typeColor[q.t]}">${typeIcon[q.t]} ${typeLabel[q.t]}</span></div>${body}<div id="fb${i}"></div></div><div class="navrow"><div class="nav-left"><button class="nbtn" onclick="go(${i-1})" ${i===0?'disabled':''}>← Prev</button><button class="nbtn" onclick="go(${i+1})" ${i===QS.length-1?'disabled':''}>Next →</button></div>${allDone?'<button class="nbtn pri" onclick="showScore()">See Results 🎉</button>':''}</div></div>`;applyAdaptiveLayout();if(answered[i]!==undefined)restoreFB(i)}
window.addEventListener('resize',applyAdaptiveLayout);
function t2fb(q,ok){return `<div class="fb ${ok?'ok':'no'}"><div>${ok?`✓ Correct! <strong>"${q.parts[q.correct]}"</strong> is the error.`:`✗ The error is <strong>"${q.parts[q.correct]}"</strong>.`}</div><div style="margin-top:5px;font-size:14px;opacity:.86">${q.reason}</div><div class="fb-label">Corrected sentence</div><div class="fb-sentence">${hiHTML(q.fix)}</div></div>`}
function restoreFB(i){const q=QS[i],fb=document.getElementById('fb'+i);if(!fb)return;const ok=answered[i]==='ok';if(q.t===1){const fi=document.getElementById('fi'+i);if(fi&&!fi.value)fi.value=q.answer;fb.className='fb '+(ok?'ok':'no');fb.textContent=ok?'✓ Correct! Well done!':'✗ Incorrect. Answer: '+q.answer}else if(q.t===2)fb.innerHTML=t2fb(q,ok);else if(q.t===3){fb.className='fb '+(ok?'ok':'no');fb.textContent=ok?'✓ Correct! Well done!':'✗ Incorrect. '+q.answer}else{const wi=document.getElementById('wi'+i);if(wi&&!wi.value)wi.value=q.answer;fb.className='fb '+(ok?'ok':'no');fb.textContent=ok?'✓ Correct! Well done!':'✗ Incorrect. Answer: '+q.answer}}
function chkFill(i){if(answered[i]!==undefined)return;const fi=document.getElementById('fi'+i),answers=[QS[i].answer,...(QS[i].alts||[])].map(norm),ok=answers.includes(norm(fi.value));answered[i]=ok?'ok':'no';fi.disabled=true;const fb=document.getElementById('fb'+i);fb.className='fb '+(ok?'ok':'no');fb.textContent=ok?'✓ Correct! Well done!':'✗ Incorrect. Answer: '+QS[i].answer;updateNav()}
function pickOpt(i,j){if(answered[i]!==undefined)return;const q=QS[i],ok=j===q.correct;answered[i]=ok?'ok':j;q.parts.forEach((_,k)=>{const b=document.getElementById('op'+i+'_'+k);if(!b)return;b.disabled=true;if(k===q.correct)b.className='obtn correct';else if(k===j&&!ok)b.className='obtn wrong'});document.getElementById('fb'+i).innerHTML=t2fb(q,ok);updateNav()}
function addC(i,ci){if(answered[i]!==undefined)return;const st=arState[i];if(!st.available.includes(ci))return;st.available=st.available.filter(x=>x!==ci);st.chosen.push(ci);render(i)}
function remC(i,j){if(answered[i]!==undefined)return;const st=arState[i],ci=st.chosen[j];st.chosen.splice(j,1);st.available.push(ci);render(i)}
function chkArr(i){if(answered[i]!==undefined)return;const q=QS[i],st=arState[i],built=norm(st.chosen.map(ci=>q.chunks[ci]).join(' ')),ok=built===norm(q.answer);answered[i]=ok?'ok':'no';const fb=document.getElementById('fb'+i);fb.className='fb '+(ok?'ok':'no');fb.textContent=ok?'✓ Correct! Well done!':'✗ Incorrect. '+q.answer;updateNav()}
function chkWord(i){if(answered[i]!==undefined)return;const wi=document.getElementById('wi'+i),ok=wordNorm(wi.value)===wordNorm(QS[i].answer);answered[i]=ok?'ok':'no';wi.disabled=true;const fb=document.getElementById('fb'+i);fb.className='fb '+(ok?'ok':'no');fb.textContent=ok?'✓ Correct! Well done!':'✗ Incorrect. Answer: '+QS[i].answer;updateNav()}
function updateNav(){const done=answered.filter(x=>x!==undefined).length,correct=answered.filter(x=>x==='ok').length,ps=document.querySelector('.prog-score'),pf=document.querySelector('.pfill'),tabs=document.querySelector('.part-tabs');if(ps)ps.textContent=`✅ ${correct} correct`;if(pf)pf.style.width=Math.round(done/QS.length*100)+'%';if(tabs)tabs.outerHTML=renderTabs(cur);if(done===QS.length){const nr=document.querySelector('.navrow');if(nr&&!nr.querySelector('.pri')){const b=document.createElement('button');b.className='nbtn pri';b.textContent='See Results 🎉';b.onclick=showScore;nr.appendChild(b)}}}
function go(i){if(i<0||i>=QS.length)return;cur=i;render(i)}
function showScore(){const correct=answered.filter(x=>x==='ok').length,pct=Math.round(correct/QS.length*100),emoji=pct>=90?'🏆':pct>=70?'🌟':pct>=50?'💪':'📖',msg=pct>=90?'Excellent! You’re a grammar star!':pct>=70?'Good job! Keep practising.':pct>=50?'Not bad. Review and try again!':'Keep studying — you can do it!',scores=PARTS.map(p=>answered.slice(p.start,p.start+p.size).filter(x=>x==='ok').length);document.getElementById('app').innerHTML=`<div class="qw"><div class="scard"><div class="trophy">${emoji}</div><div class="sbig">${correct}/${QS.length}</div><div class="smsg">${msg}</div><div class="slbl">${pct}% correct</div><div class="sbreak"><div class="sbi">✏️ Complete: ${scores[0]}/14</div><div class="sbi">🔍 Find error: ${scores[1]}/14</div><div class="sbi">🔀 Arrange: ${scores[2]}/14</div><div class="sbi">🔤 Vocabulary: ${scores[3]}/14</div></div><button class="rbtn" onclick="restart()">🔄 Try Again</button></div></div>`}

render(0);
